<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de contacto</title>
</head>
<body>
    <header>
        <section>
            <h1>Formulario de contacto</h1>
            <h2>Contáctame...</h2>
            <p>Si deseas ponerte en contacto conmigo, puedes llenar los campos a continuación y enviarme un mensaje.
                Estoy abierto a oportunidades de colaboración, preguntas o simplemente para charlar sobre temas de interés.
            </p>
        </section>
        <form action="">
            <label for="nombre" >Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>
            <br><br>
            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email" required>
            <br><br>
            <label for="mensaje">Mensaje:</label>
            <textarea id="mensaje" name="mensaje" required></textarea>
            <br><br>
            <input type="submit" value="Enviar">
        </form>
    </header>
</body>
</html>
